---
# Source: isdargo/templates/opa/opa-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: opa
    heritage: "Helm"
    release: "isdargo"
    chart: "isdargo-4.1.11"
  name: opa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      annotations:
      labels:
        app: opa
        heritage: "Helm"
        release: "isdargo"
        chart: "isdargo-4.1.11"
      name: opa
    spec:
      containers:
        - name: opa
          image: quay.io/opsmxpublic/opa:1.6.0
          args:
            - "run"
            - "--server"
        - name: opa-persist
          command:
          - /bin/bash
          - /tmp/config/opa-persist.sh
          envFrom:
          - secretRef:
              name: oes-gate-secret
          image: quay.io/opsmxpublic/customterraformstage:v1
          imagePullPolicy: IfNotPresent
          volumeMounts:
          - mountPath: /tmp/config
            name: opa-persist
      restartPolicy: Always
      volumes:
        - configMap:
            defaultMode: 420
            name: opa-persist
          name: opa-persist
