---
# Source: isdargo/templates/oes-ui/oes-ui-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: oes
    component: ui
    heritage: "Helm"
    release: "isdargo"
    chart: "isdargo-4.1.11"
  name: oes-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oes
      component: ui
  template:
    metadata:
      annotations:
        checksum/configmap: d884b8c12ed407b0e2ccff621c2ec92c193bdbaf13673ef473491437cae9a962
      labels:
        app: oes
        component: ui
        heritage: "Helm"
        release: "isdargo"
        chart: "isdargo-4.1.11"
    spec:
      containers:
      - image: quay.io/opsmxpublic/ubi8-oes-ui:isd-argo-2026.02.00-rc2-672a932-202602130621
        name: oes-ui
        env:
        - name: JAVA_OPTS
          value: -Xmx512m
        ports:
        - containerPort: 8080
          protocol: TCP
        volumeMounts:
        - name: config-dir
          mountPath: /var/www/html/ui/assets/config/app-config.json
          subPath: app-config.json
        - name: config-dir
          mountPath: /var/www/html/ui/assets/config/help-text.json
          subPath: help-text.json
        - mountPath: /etc/nginx/nginx.conf
          name: nginx-config
          subPath: nginx-ap-only.conf
        readinessProbe:
          tcpSocket:
            port: 8093
          initialDelaySeconds: 15
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /ui/indexl.html
            port: 8093
          initialDelaySeconds: 15
          periodSeconds: 5
      volumes:
      - configMap:
          defaultMode: 420
          name: oes-ui-config
        name: config-dir
      - configMap:
          defaultMode: 420
          name: oes-ui-nginxconf
        name: nginx-config
