---
# Source: isdargo/templates/oes-platform/oes-platform-secret.yaml
apiVersion: v1
stringData:
  platform-local.yml: |
    
    spring:
      main:
        allow-circular-references: true
        lazy-initialization: true
      datasource:
        url: jdbc:postgresql://oes-db:5432/platformdb
        username: 'encrypted:isdsecrets:dbusername'
        password: 'encrypted:isdsecrets:dbpassword'
    ldap.managerPassword: 'opsmxadmin123'
    redis:
        connection: redis://:encrypted:isdsecrets:redispassword@isdargo-redis-master:6379
    #datasource.url: jdbc:postgresql://oes-db:5432/visibilitydb
    #postgres.password: 'encrypted:isdsecrets:dbpassword'
    #postgres.username: 'encrypted:isdsecrets:dbusername'
    
    datasource:
      secretManagement:
        source: db
    rbacEnabled: true
    supportedFeatures:
      - deployment_verification
      - sapor
      - visibility
    userGroup:
      superAdminGroups: encrypted:isdsecrets:saporgateadmingroup
    dashboard:
      scheduler:
        enable: false
        fixedDelay:
          in:
            milliseconds: 120000
        initialDelay:
          in:
            milliseconds: 300000
        workerThreads: 50
    user:
      source: gate
    ldap:
      enabled: false
      url: ldap://openldap:389
      managerDn: cn=admin,dc=example,dc=org
      groupSearchBase: ou=groups,dc=example,dc=org
      groupSearchFilter: member={0}
      groupRoleAttributes: cn
      userDnPattern: cn={0},dc=example,dc=org
    
    oes:
      sapor:
        url: http://oes-sapor:8085
      autopilot:
        url: http://oes-autopilot:8090
      dashboard:
        url: http://oes-dashboard:8094
      visibility:
        url: http://oes-visibility:8096
      auditclient:
        url: http://oes-audit-client:8098
      policyGate:
        url: "https://isd-argotest.opsmx.org/gate"
        path: /v1/data/
      ui:
      # Ex: "https://oes-poc.dev.opsmx.org/"
        url: "https://isd-argotest.opsmx.org/ui"
      gate:
        url: http://oes-gate:8084
      carinamanager:
        url: "http://oes-carina"
        managerport: 8091
        rbacport: 8092
      approvalGate:
        apiUrl: https://isd-argotest.opsmx.org/gate/visibilityservice/v5/approvalGates/{id}/trigger
    
      verificationGate:
        apiUrl: https://isd-argotest.opsmx.org/gate/autopilot/api/v3/registerCanary
    
    logging:
      level:
        com.opsmx.platformservice: INFO
        org.springframework.security: INFO
        org.springframework.web: INFO
    
    standardErrorCodes:
      filePath: /opsmx/conf/standard-error-code.csv
    argoRollout:
      appAutoCreation: true
    
kind: Secret
metadata:
  name: oes-platform-config
  labels:
    app: oes
    component: platform
    heritage: "Helm"
    release: "isdargo"
    chart: "isdargo-4.1.11"
