---
# Source: isdargo/templates/oes-datascience/oes-datascience-secret.yaml
apiVersion: v1
stringData:
  app-config.yml: |
    # Enable Build Analysis
    APP:
       ENVIRONMENT: dev
       DEBUG: True
       # Only accept True or False
       BIND: 0.0.0.0:5005
       WORKERS: 1
       PROTOCOL: http://
       TIMEOUT: 3600
       CELERY_ENABLED: True
       # Only accept True or False
    
    OBJECT_STORAGE:
          ENDPOINT: http://isdargo-minio:9000
          BUCKET_NAME: autopilot
    POSTGRES:
          USERNAME: 'encrypted:isdsecrets:dbusername'
          PASSWORD: 'encrypted:isdsecrets:dbpassword'
          HOST: oes-db
          PORT: 5432
          DB: autopilotqueue
    
    RABBITMQ:
          USERNAME: 'rabbitmq'
          PASSWORD: 'encrypted:isdsecrets:rabbitmqpassword'
          HOST: rabbitmq-service
          PORT: 5672
    
  minio-credentials: |
    [default]
        aws_access_key_id = encrypted:isdsecrets:miniopassword
        aws_secret_access_key = encrypted:isdsecrets:miniopassword
    
    
kind: Secret
metadata:
  labels:
    app: oes
    component: datascience
  name: oes-datascience-config
