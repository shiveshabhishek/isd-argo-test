---
# Source: isdargo/charts/argo-rollouts/templates/dashboard/clusterrole.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: isdargo-argo-rollouts-dashboard
  labels:
    app.kubernetes.io/component: rollouts-dashboard
    helm.sh/chart: argo-rollouts-2.21.1
    app.kubernetes.io/name: argo-rollouts
    app.kubernetes.io/instance: isdargo
    app.kubernetes.io/version: "v1.3.1"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: argo-rollouts
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - rollouts
      - rollouts/status
      - rollouts/finalizers
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - argoproj.io
    resources:
      - analysisruns
      - analysisruns/finalizers
      - experiments
      - experiments/finalizers
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - argoproj.io
    resources:
      - analysistemplates
      - clusteranalysistemplates
    verbs:
      - get
      - list
      - watch
  # deployments and podtemplates read access needed for workload reference support
  - apiGroups:
      - ""
      - apps
    resources:
      - deployments
      - podtemplates
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - list
      - watch
