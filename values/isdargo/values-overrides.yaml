##### This file can be used for Installing Only ISD Components ###############################
# Update the controller URL which needs to be reachable from other clusters where ArgoCD is running
# After installation, the DNS must be updated to point this to EXTERNAL-IP of the agent-grpc service
# kubectl get svc -n opsmx-isd agent-grpc
###################################
k8sServiceType: LoadBalancer

forwarder:
  enabled: true
  agent:
    serviceType: LoadBalancer
    # Value is also used in sapor configuration for kubernetes.agent.serverHostName
    host: isd-argotest-controller.opsmx.org
    ingress:
      annotations:
        kubernetes.io/ingress.class: nginx
      tls:
        secretName: controller-ingress
  image:
    repository: quay.io/opsmxpublic/agent-controller
    tag: v5.1.2
    pullPolicy: IfNotPresent
  serverNames:
    - agent-grpc

  serviceAnnotations: {}

minio:
  enabled: true
  image:
    repository: quay.io/opsmxpublic/minio
    tag: RELEASE.2020-01-03T19-12-21Z
  mcImage:
    repository: quay.io/opsmxpublic/minio-mc
    tag: RELEASE.2020-11-25T23-04-07Z



global:
  createIngress: false
  installOpenLdap: false
  oesUI:
    # Please below string for all occurences in this file with proper dns entry to access the ISD UI eg: isdui.example.ops.com
    host: isd-argotest.opsmx.org

  vela:
    # Please below string for all occurences in this file with proper dns entry to access the ISD UI eg: keycloak.example.ops.com$
    host: vela-isd-argotest.opsmx.org

  redis:
    password: encrypted:isdsecrets:redispassword
    
  minio:
    accessKey: encrypted:isdsecrets:miniopassword
    secretKey: encrypted:isdsecrets:miniopassword 

    ## Valid admin details for ISD authorization
  saporgate:
    config:
      username: encrypted:isdsecrets:saporgateusername     #Name of the valid user in your service provider
      adminGroups: encrypted:isdsecrets:saporgateadmingroup    #Name of the valid admin group in your service provider
      password: encrypted:isdsecrets:saporgatepassword  #password for the saporgate

  ldap:
    enabled: false

#######################################################################################################################

opa:
  enabled: true
  image:
    repository: quay.io/opsmxpublic/opa
    tag: 1.6.0
    pullPolicy: IfNotPresent

  
# Values of OES Database
db:
  ## Set it to false if any external database is to be used
  enabled: true
  url: jdbc:postgresql://oes-db:5432
  username: encrypted:isdsecrets:dbusername
  password: encrypted:isdsecrets:dbpassword
  
rabbitmq:
  username: rabbitmq
  password: encrypted:isdsecrets:rabbitmqpassword
redis:
 # url: redis://:encrypted:redispassword:redispassword@{{ .Release.Name }}-redis-master
