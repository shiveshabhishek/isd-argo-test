##### This file can be used for Installing Only ISD Components ###############################
# Update the controller URL which needs to be reachable from other clusters where ArgoCD is running
# After installation, the DNS must be updated to point this to EXTERNAL-IP of the agent-grpc service
# kubectl get svc -n opsmx-isd agent-grpc
###################################
forwarder:
  enabled: true
  agent:
    serviceType: ClusterIP
    # Value is also used in sapor configuration for kubernetes.agent.serverHostName
    host: isd-argotest-controller.cdaas.opsmx.org
    ingress:
      annotations:
        kubernetes.io/ingress.class: nginx
      tls:
        secretName: controller-ingress
  image:
    repository: quay.io/opsmxpublic/agent-controller
    tag: v5.1.4
    pullPolicy: IfNotPresent
  serverNames:
    - agent-grpc

  serviceAnnotations: {}

minio:
  enabled: true
  image:
    repository: quay.io/opsmxpublic/minio
    tag: RELEASE.2020-12-03T05-49-24Z


global:
  installOpenLdap: false
  ldap:
    enabled: false
  oesUI:
    host: isd-argotest.cdaas.opsmx.org

  vela:
    host: vela-isd-argotest.cdaas.opsmx.org

  saporgate:
    config:
      username: admin
      adminGroups: admin

opa:
  enabled: true
  image:
    repository: quay.io/opsmxpublic/opa
    tag: 1.6.0

