## Values of OEA Gate
##
gate:
  ## Image specific details
  image:
    repository: ubi8-gate
    tag: 82596051-202601060752
    pullPolicy: IfNotPresent
  config:
    #####################################################
    # SAML AUthentication
    #####################################################
    # openssl req -newkey rsa:2048 -nodes -keyout key.pem -x509 -days 365 -out cert.pem
    # kubectl create secret generic samlcerts --from-file key.pem --from-file cert.pem -n namespace
    # security:
    #   user:
    #     name: admin
    #     password: saporadmin
    
    spring:
      security:
        saml2:
          enabled: true
          registration-id: SSO #change this to the application name in OKTA
          relyingparty:
            registration:
              SSO:   #change this to the application name in OKTA
                entity-id: azure-isd #change this to the Okta SP entity id
                acs:
                  location: https://isd-argotest.opsmx.org/saml/SSO
                assertingparty:
                  metadata-uri: https://dev-80355908.okta.com/app/exkk1qik37OLXxTVk5d7/sso/saml/metadata
                decryption: 
                  credentials:
                    - private-key-location: file:/opt/saml/certs/key.pem  
                      certificate-location: file:/opt/saml/certs/cert.pem
                  singlesignon.sign-request: true
          user-attribute-mapping:
            firstName: firstName
            lastName: lastName
            roles:
              attributeName: memberOf  # Update attributeName here
              sortRoles: true
              forceLowercaseRoles: true
              rolesDelimiter: ","
            email: email
          signatureDigest: SHA256
          userSource: gate

