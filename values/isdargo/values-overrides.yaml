## Values of OEA Gate
gate:
  image:
    repository: ubi8-oes-gate
    tag: isd-argo-2026.02.00-rc1-2f794ffe-202602161145
    pullPolicy: IfNotPresent

  volumes:
    - name: samlcerts
      secret:
        defaultMode: 420
        secretName: samlcerts
        items:
          - key: key.pem
            path: key.pem
          - key: cert.pem
            path: cert.pem

  volumeMounts:
    - name: samlcerts
      mountPath: /opt/saml/certs
      readOnly: true

  config:
    spring:
      security:
        saml2:
          enabled: true
          registration-id: SSO
          relyingparty:
            registration:
              SSO:
                entity-id: isdargo-test
                acs:
                  location: https://isd-argotest.cdaas.opsmx.org/saml/SSO
                assertingparty:
                  metadata-uri: https://integrator-2160818.okta.com/app/exk10j02dmsSPioen698/sso/saml/metadata
                decryption:
                  credentials:
                    - private-key-location: file:/opt/saml/certs/key.pem
                      certificate-location: file:/opt/saml/certs/cert.pem
                singlesignon.sign-request: true
          user-attribute-mapping:
            firstName: firstName
            lastName: lastName
            roles:
              attributeName: memberOf
              sortRoles: true
              forceLowercaseRoles: true
              rolesDelimiter: ','
            email: email
          signatureDigest: SHA256
          userSource: gate

